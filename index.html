<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompStock Manager - ระบบจัดการสินค้าอุปกรณ์คอมพิวเตอร์</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
  :root {
    --navy: #0A369D;
    --blue: #0D6EFD;
    --bg: #F7F9FC;
  }
  body {
    background-color: var(--bg);
    font-family: "Segoe UI", "Sarabun", Tahoma, sans-serif;
  }
  .navbar-custom {
    background-color: #FFFFFF;
    border-bottom: 1px solid #E9ECEF;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .navbar-brand-custom {
    color: var(--navy);
    font-weight: 700;
    font-size: 1.35rem;
  }
  .navbar-brand-custom i {
    color: var(--blue);
  }
  .btn-navy {
    background-color: var(--blue);
    border-color: var(--blue);
    color: #fff;
    font-weight: 600;
  }
  .btn-navy:hover {
    background-color: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }
  .product-card {
    border: 1px solid #EDF0F5;
    border-radius: 14px;
    overflow: hidden;
    transition: transform .15s ease, box-shadow .15s ease;
    background: #fff;
  }
  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(10,54,157,0.08);
  }
  .product-img-wrap {
    width: 100%;
    height: 190px;
    background: #F1F4F9;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .product-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .product-img-wrap i {
    font-size: 3rem;
    color: #C7D0DE;
  }
  .price-badge {
    color: var(--navy);
    font-weight: 700;
    font-size: 1.1rem;
  }
  .card-title-custom {
    font-weight: 600;
    color: #1B2430;
  }
  .card-desc {
    color: #6C7583;
    font-size: 0.88rem;
    min-height: 40px;
  }
  .card-date {
    font-size: 0.78rem;
    color: #9AA3B2;
  }
  #imagePreviewWrap {
    display: none;
    margin-top: 10px;
  }
  #imagePreview {
    max-height: 200px;
    border-radius: 10px;
    border: 1px solid #E9ECEF;
  }
  .empty-state, .loading-state {
    padding: 80px 20px;
    text-align: center;
    color: #9AA3B2;
  }
  .empty-state i, .loading-state i {
    font-size: 3.5rem;
    color: #D6DEEA;
  }
  .modal-header {
    background-color: var(--navy);
    color: #fff;
  }
  .modal-header .btn-close {
    filter: invert(1) grayscale(100%) brightness(200%);
  }
  .section-title {
    color: var(--navy);
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-custom sticky-top py-3">
  <div class="container">
    <span class="navbar-brand-custom d-flex align-items-center gap-2 mb-0">
      <i class="bi bi-hdd-stack-fill"></i> CompStock Manager
    </span>
    <button class="btn btn-navy px-3" data-bs-toggle="modal" data-bs-target="#addProductModal">
      <i class="bi bi-plus-lg"></i> เพิ่มสินค้าใหม่
    </button>
  </div>
</nav>

<div class="container py-4">
  <h5 class="section-title mb-3"><i class="bi bi-box-seam"></i> รายการสินค้าอุปกรณ์คอมพิวเตอร์</h5>

  <!-- Loading -->
  <div id="loadingState" class="loading-state">
    <div class="spinner-border" style="color: var(--blue);" role="status"></div>
    <p class="mt-3">กำลังโหลดข้อมูลสินค้า...</p>
  </div>

  <!-- Empty state -->
  <div id="emptyState" class="empty-state d-none">
    <i class="bi bi-inbox"></i>
    <p class="mt-3 mb-0">ยังไม่มีสินค้าในระบบ</p>
    <p>กดปุ่ม "เพิ่มสินค้าใหม่" เพื่อเริ่มบันทึกข้อมูล</p>
  </div>

  <!-- Product grid -->
  <div id="productGrid" class="row g-4"></div>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-plus-circle"></i> เพิ่มสินค้าใหม่</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="addProductForm">
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label fw-semibold">ชื่อสินค้า <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="productName" placeholder="เช่น RAM DDR4 16GB" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">รายละเอียดสินค้า</label>
            <textarea class="form-control" id="productDesc" rows="3" placeholder="รายละเอียด สเปค หรือหมายเหตุเพิ่มเติม"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">ราคา (บาท) <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text">฿</span>
              <input type="number" class="form-control" id="productPrice" min="0" step="0.01" placeholder="0.00" required>
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label fw-semibold">รูปภาพสินค้า</label>
            <input type="file" class="form-control" id="productImage" accept="image/*" capture="environment">
            <div class="form-text"><i class="bi bi-camera"></i> สามารถถ่ายรูปจากกล้องมือถือ หรือเลือกไฟล์จากเครื่องได้</div>
          </div>

          <div id="imagePreviewWrap" class="text-center">
            <img id="imagePreview" src="" alt="Preview">
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="submit" class="btn btn-navy" id="saveBtn">
            <span id="saveBtnText"><i class="bi bi-save"></i> บันทึกสินค้า</span>
            <span id="saveBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="appToast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="appToastBody">-</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
/* ============================================================
   ส่วนที่ 2: ตั้งค่าการเชื่อมต่อ Supabase
   ⚠️ แก้ไข SUPABASE_URL และ SUPABASE_ANON_KEY เป็นของโปรเจกต์คุณ
   หาได้จาก Supabase Dashboard > Project Settings > API
   ============================================================ */
const SUPABASE_URL = "https://hmjlbwymcfajrsikokcw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhtamxid3ltY2ZhanJzaWtva2N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3ODkyMzMsImV4cCI6MjEwMDM2NTIzM30.oGT8ptwqoOBT4w0c3d8RYMtPSnS8fMJ5m5vxdBqddWQ";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BUCKET_NAME = "product-images";
const TABLE_NAME = "products";
const CLOUDINARY_CLOUD_NAME = "skydetg1";
const CLOUDINARY_UPLOAD_PRESET = "compstock_unsigned";

// ------------------- DOM Elements -------------------
const productGrid = document.getElementById("productGrid");
const loadingState = document.getElementById("loadingState");
const emptyState = document.getElementById("emptyState");
const addProductForm = document.getElementById("addProductForm");
const productImageInput = document.getElementById("productImage");
const imagePreviewWrap = document.getElementById("imagePreviewWrap");
const imagePreview = document.getElementById("imagePreview");
const saveBtn = document.getElementById("saveBtn");
const saveBtnText = document.getElementById("saveBtnText");
const saveBtnSpinner = document.getElementById("saveBtnSpinner");
const addProductModalEl = document.getElementById("addProductModal");
const addProductModal = new bootstrap.Modal(addProductModalEl);

// ------------------- Utility: Toast -------------------
function showToast(message, type = "success") {
  const toastEl = document.getElementById("appToast");
  const toastBody = document.getElementById("appToastBody");
  toastEl.classList.remove("bg-success", "bg-danger");
  toastEl.classList.add(type === "success" ? "bg-success" : "bg-danger");
  toastBody.textContent = message;
  const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
  toast.show();
}

// ------------------- Utility: Format Price -------------------
function formatPrice(price) {
  return "฿" + Number(price).toLocaleString("th-TH", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

// ------------------- Utility: Format Date -------------------
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString("th-TH", { year: "numeric", month: "short", day: "numeric" }) +
    " " + d.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
}

// ------------------- Cloudinary upload helpers -------------------
async function uploadProductImage(file) {
  if (!file) return null;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

  const response = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
    {
      method: "POST",
      body: formData,
    }
  );

  const result = await response.json();
  if (!response.ok) {
    throw new Error(result?.error?.message || "Cloudinary upload failed");
  }

  return result.secure_url;
}

// ------------------- Image Preview -------------------
productImageInput.addEventListener("change", () => {
  const file = productImageInput.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      imagePreview.src = e.target.result;
      imagePreviewWrap.style.display = "block";
    };
    reader.readAsDataURL(file);
  } else {
    imagePreviewWrap.style.display = "none";
    imagePreview.src = "";
  }
});

// ------------------- ฟังก์ชันลบรูปแบบ Cloudinary / local -------------------
async function deleteProductImage(imageUrl) {
  if (!imageUrl) return;
  return;
}

/* ============================================================
   ส่วนที่ 3: ระบบ CRUD (Fetch / Insert / Delete)
   ============================================================ */

// ------------------- Fetch รายการสินค้าทั้งหมด -------------------
async function fetchProducts() {
  loadingState.classList.remove("d-none");
  emptyState.classList.add("d-none");
  productGrid.innerHTML = "";

  const { data, error } = await supabaseClient
    .from(TABLE_NAME)
    .select("*")
    .order("created_at", { ascending: false });

  loadingState.classList.add("d-none");

  if (error) {
    console.error("Fetch error:", error);
    showToast("ไม่สามารถโหลดข้อมูลสินค้าได้: " + error.message, "danger");
    return;
  }

  if (!data || data.length === 0) {
    emptyState.classList.remove("d-none");
    return;
  }

  await renderProducts(data);
}

// ------------------- Render สินค้าเป็น Card -------------------
async function renderProducts(products) {
  productGrid.innerHTML = "";

  for (const p of products) {
    const col = document.createElement("div");
    col.className = "col-12 col-sm-6 col-lg-4 col-xl-3";

    const imageHtml = p.image_url
      ? `<img src="${p.image_url}" alt="${escapeHtml(p.name)}">`
      : `<i class="bi bi-image"></i>`;

    col.innerHTML = `
      <div class="card product-card h-100">
        <div class="product-img-wrap">${imageHtml}</div>
        <div class="card-body d-flex flex-column">
          <h6 class="card-title-custom mb-1">${escapeHtml(p.name)}</h6>
          <p class="card-desc mb-2">${escapeHtml(p.description || "ไม่มีรายละเอียด")}</p>
          <div class="d-flex justify-content-between align-items-center mt-auto">
            <span class="price-badge">${formatPrice(p.price)}</span>
            <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${p.id}" data-image="${p.image_url || ""}">
              <i class="bi bi-trash"></i>
            </button>
          </div>
          <div class="card-date mt-2"><i class="bi bi-clock-history"></i> ${formatDate(p.created_at)}</div>
        </div>
      </div>
    `;
    productGrid.appendChild(col);
  }

  document.querySelectorAll(".delete-btn").forEach((btn) => {
    btn.addEventListener("click", () => handleDelete(btn.dataset.id, btn.dataset.image));
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ------------------- Insert สินค้าใหม่ -------------------
addProductForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("productName").value.trim();
  const description = document.getElementById("productDesc").value.trim();
  const price = document.getElementById("productPrice").value;
  const file = productImageInput.files[0];

  if (!name || !price) {
    showToast("กรุณากรอกชื่อสินค้าและราคาให้ครบถ้วน", "danger");
    return;
  }

  setSaving(true);

  try {
    let imageUrl = null;

    if (file) {
      imageUrl = await uploadProductImage(file);
    }

    const payload = {
      name,
      description,
      price: parseFloat(price),
      image_url: imageUrl,
    };

    const { data, error } = await supabaseClient
      .from(TABLE_NAME)
      .insert([payload])
      .select()
      .single();

    if (error) throw error;
    if (!data) throw new Error("Supabase insert returned no data");

    console.log("Insert success:", data);
    showToast("บันทึกสินค้าเรียบร้อยแล้ว");
    addProductForm.reset();
    imagePreviewWrap.style.display = "none";
    imagePreview.src = "";
    addProductModal.hide();
    await fetchProducts();
  } catch (err) {
    console.error("Insert error:", err);
    showToast("เกิดข้อผิดพลาดในการบันทึก: " + (err?.message || err), "danger");
  } finally {
    setSaving(false);
  }
});

function setSaving(isSaving) {
  saveBtn.disabled = isSaving;
  saveBtnText.classList.toggle("d-none", isSaving);
  saveBtnSpinner.classList.toggle("d-none", !isSaving);
}

// ------------------- Delete สินค้า -------------------
async function handleDelete(id, imageUrl) {
  if (!confirm("ยืนยันการลบสินค้านี้หรือไม่?")) return;

  try {
    await deleteProductImage(imageUrl);

    const { error } = await supabaseClient.from(TABLE_NAME).delete().eq("id", id);
    if (error) throw error;

    showToast("ลบสินค้าเรียบร้อยแล้ว");
    await fetchProducts();
  } catch (err) {
    console.error("Delete error:", err);
    showToast("เกิดข้อผิดพลาดในการลบสินค้า: " + err.message, "danger");
  }
}

// รีเซ็ตฟอร์มเมื่อปิด Modal
addProductModalEl.addEventListener("hidden.bs.modal", () => {
  addProductForm.reset();
  imagePreviewWrap.style.display = "none";
  imagePreview.src = "";
});

// ------------------- Init -------------------
fetchProducts();
</script>

</body>
</html>
