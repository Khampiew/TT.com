      if (!specs || !Object.keys(specs).length) return '';

          .filter(([k, v]) => v) // Filter out empty values
          .map(([k, v]) => `${k}: ${v}`)
          .slice(0, 2); // Show max 2 specs
      return pairs.join(', ');
  }

      const cpuSocket = cpu.specs.socket;
      return allProducts.filter(p => p.category === 'Motherboard' && p.specs && p.specs.socket === cpuSocket);

      if (!mobo || !mobo.specs || !mobo.specs.socket) return allProducts.filter(p => p.category === 'CPU');
      const moboSocket = mobo.specs.socket;
      return allProducts.filter(p => p.category === 'CPU' && p.specs && p.specs.socket === moboSocket);
  }
  
  function getCompatibleRAM() {
      const mobo = selectedParts['Motherboard'];
      if (!mobo || !mobo.specs || !mobo.specs['supported-ram']) return allProducts.filter(p => p.category === 'RAM');
      const ramType = mobo.specs['supported-ram'];
      return allProducts.filter(p => p.category === 'RAM' && p.specs && p.specs['ram-type'] === ramType);

  function calculatePowerEstimate() {
      let power = 50; // Base system power
      if (selectedParts['CPU'] && selectedParts['CPU'].specs) {
          // Extract cores number from format like "8-Core / 16-Thread"
          const coresStr = selectedParts['CPU'].specs.cores || '';
          const coresMatch = coresStr.match(/(\d+)/);
          const cores = coresMatch ? parseInt(coresMatch[1]) : 0;
          power += Math.max(65, cores * 5); // Rough CPU power estimate
      }
      if (selectedParts['GPU'] && selectedParts['GPU'].specs) {
          const vram = selectedParts['GPU'].specs.vram ? parseInt(selectedParts['GPU'].specs.vram) : 0;
          power += Math.max(120, vram * 10); // Rough GPU power
      }
      // Add wattage from each component if available
      Object.values(selectedParts).forEach(part => {
          if (part && part.specs && part.specs.wattage) {
              const wt = parseInt(part.specs.wattage) || 0;
              if (wt > 0) power += wt;
          }
      });
      return power;
  }
  
  function getCompatibilityStatus() {
      const status = { isCompatible: true, warnings: [] };
      const cpu = selectedParts['CPU'];
      const mobo = selectedParts['Motherboard'];
      const ram = selectedParts['RAM'];
      const cooler = selectedParts['CPU Cooler'];
      
      if (cpu && mobo && cpu.specs && mobo.specs) {
          if (cpu.specs.socket && mobo.specs.socket && cpu.specs.socket !== mobo.specs.socket) {
              status.isCompatible = false;
              status.warnings.push(`Socket Mismatch: ${cpu.specs.socket} vs ${mobo.specs.socket}`);
          }
      }
      
      if (mobo && ram && mobo.specs && ram.specs) {
          if (mobo.specs['supported-ram'] && ram.specs['ram-type'] && mobo.specs['supported-ram'] !== ram.specs['ram-type']) {
              status.isCompatible = false;
              status.warnings.push(`RAM Type Mismatch: ${mobo.specs['supported-ram']} vs ${ram.specs['ram-type']}`);
          }
      }
      
      if (cpu && cooler && cpu.specs && cooler.specs) {
          if (cpu.specs.socket && cooler.specs.socket && cpu.specs.socket !== cooler.specs.socket) {
              status.isCompatible = false;
              status.warnings.push(`Cooler Socket Mismatch: ${cpu.specs.socket} vs ${cooler.specs.socket}`);
          }
      }
      
      const psu = selectedParts['PSU'];
      const powerNeeded = calculatePowerEstimate();
      if (psu && psu.specs && psu.specs.wattage) {
          const psuWatts = parseInt(psu.specs.wattage) || 0;
          if (psuWatts < powerNeeded) {
              status.warnings.push(`⚠️ PSU: ${psuWatts}W may be insufficient for ${powerNeeded}W needed`);
          }
      }
      
      return status;
  }
  
  function filterProductsBySearch(products, searchTerm) {
      if (!searchTerm) return products;
      return products.filter(p => {
          const name = (p.name || p.name_en || '').toLowerCase();
          return name.includes(searchTerm.toLowerCase());
      });
  }
  
  function sortProducts(products, sortOrder) {
      const sorted = [...products];
      if (sortOrder === 'price-asc') {
          sorted.sort((a, b) => (a.price || 0) - (b.price || 0));
      } else if (sortOrder === 'price-desc') {
          sorted.sort((a, b) => (b.price || 0) - (a.price || 0));
      }
      return sorted;
  }
  
  function filterCatalog(targetCat, searchTerm = '', sortOrder = '') {
      const grid = document.getElementById('product-grid');
      
      // Normalize category comparison
      const normalizeCategory = (str) => (str || '').toLowerCase().trim();
      const targetNorm = normalizeCategory(targetCat);
      
      let filtered = targetNorm === 'all' 
          ? allProducts 
          : allProducts.filter(p => {
              const pCat = normalizeCategory(p.category);
              // Handle CPU Fan / CPU Cooler both ways
              if (targetNorm === 'cpu fan' || targetNorm === 'cpu cooler') {
                  return pCat === 'cpu fan' || pCat === 'cpu cooler';
              }
              return pCat === targetNorm;
            });
      
      // apply search and sort
      const search = searchTerm || (document.getElementById('catalog-search') ? document.getElementById('catalog-search').value : '');
      const sort = sortOrder || (document.getElementById('catalog-sort') ? document.getElementById('catalog-sort').value : '');
      filtered = filterProductsBySearch(filtered, search);
      filtered = sortProducts(filtered, sort);
  
      // pagination
      const totalItems = filtered.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * PAGE_SIZE;
      const paged = filtered.slice(start, start + PAGE_SIZE);
  
      grid.innerHTML = paged.map(p => `
          <div class="p-3 md:p-5 rounded-2xl flex flex-col group border border-gray-200 relative animate-fade-in transition-all hover:shadow-sm bg-slate-950/80">
              ${SHOW_ADMIN_BUTTONS ? `<button onclick="deleteProduct('${p.id}')" class="delete-btn bg-red-100/80 hover:bg-red-200 text-red-600 px-2 py-1 rounded text-[11px] font-semibold opacity-0 group-hover:opacity-100 transition">DEL</button>` : ''}
              <div class="rounded-xl p-2 mb-3 h-32 md:h-40 flex items-center justify-center overflow-hidden" style="background: rgba(255,255,255,0.03);">
                  <img src="${p.image_url}" class="max-h-full object-contain transition duration-500">
              </div>
              <div class="text-[10px] font-bold uppercase mb-1 tracking-widest text-cyan-400">${getCategoryName(p.category)}</div>
              <div class="text-[15px] md:text-xl text-slate-100 font-extrabold mb-2 h-8 line-clamp-2 leading-tight product-card-title">${p.name || p.name_en || ''}</div>
              <div class="text-[12px] text-slate-400 mb-3 line-clamp-2 h-8">${formatSpecs(p.specs)}</div>
              <div class="flex justify-between items-end mt-auto">
                  <div class="text-sm md:text-lg text-emerald-400 font-gaming font-bold">${formatPrice(p.price)} <span class="text-[12px]">₭</span></div>
                  ${SHOW_ADMIN_BUTTONS ? `<button onclick="openEditModal('${p.id}')" class="bg-transparent border border-cyan-500/50 text-cyan-400 hover:bg-cyan-600 hover:text-white px-3 py-2 rounded-lg transition-all text-[12px] font-semibold">Edit</button>` : ''}
              </div>
          </div>`).join('');
  
      renderPagination(totalItems);
  }

  async function deleteProduct(productId) {
      if (!confirm("ลบสินค้านี้ใช่หรือไม่?")) return;
      try {
          if (!supabaseClient) throw new Error('Supabase client not configured');
          const { error } = await supabaseClient.from('products').delete().eq('id', productId);
          if (error) throw error;
          await fetchProductsFromSupabase();
      } catch (err) {

      }
  }
  
  // Image preview
  document.getElementById('p-image-file').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
          const reader = new FileReader();
          reader.onload = function(event) {
              const previewImg = document.getElementById('preview-img');
              previewImg.src = event.target.result;
              previewImg.classList.remove('hidden');
          };
          reader.readAsDataURL(file);
      }
  });
  
  // Form submission
  document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-save');
      const pId = document.getElementById('p-id').value;
  
      btn.disabled = true;
      btn.innerText = "Processing...";
  
      try {
          const specInputs = document.querySelectorAll('[id^="spec-"]');
          const specs = {};
          specInputs.forEach(input => {
              const key = input.id.replace('spec-', '');
              specs[key] = input.value;
          });
  
          const productData = {
              name: document.getElementById('p-name').value,
              category: document.getElementById('p-category').value,
              price: parseFloat(document.getElementById('p-price').value),
              specs: specs,
              image_url: "https://via.placeholder.com/150"
          };
  
          // Handle image
          const fileInput = document.getElementById('p-image-file');
          if (fileInput.files.length > 0) {
              const file = fileInput.files[0];
              const reader = new FileReader();
              reader.onload = function(event) {
                  productData.image_url = event.target.result; // Base64
                  saveProductToStorage(pId, productData, btn);
              };
              reader.readAsDataURL(file);
          } else {
              // If editing and no new image, keep old image
              if (pId) {
                  const oldProduct = allProducts.find(p => p.id === pId);
                  if (oldProduct) {
                      productData.image_url = oldProduct.image_url;
                  }
              }
              saveProductToStorage(pId, productData, btn);
          }
      } catch (err) {
          alert("ผิดพลาด: " + err.message);
          btn.disabled = false;
          btn.innerText = btn.innerText.replace("Processing...", "Save Changes");
      }
  });
  
  async function saveProductToStorage(pId, productData, btn) {
      try {
          if (!supabaseClient) throw new Error('Supabase client not configured');
  
          if (pId) {
              // Update existing row
              const { data, error } = await supabaseClient
                  .from('products')
                  .update({
                      name: productData.name,
                      category: productData.category,
                      price: productData.price,
                      image_url: productData.image_url,
                      specs: productData.specs
                  })
                  .eq('id', pId)
                  .select()
                  .single();
              if (error) throw error;
          } else {
              // Insert new row
              const insertObj = {
                  name: productData.name,
                  category: productData.category,
                  price: productData.price,
                  image_url: productData.image_url,
                  specs: productData.specs
              };
              const { data, error } = await supabaseClient.from('products').insert([insertObj]).select().single();
              if (error) throw error;
          }
  
          alert("สำเร็จ!");
          closeAdminModal();
          await fetchProductsFromSupabase();
      } catch (err) {
          alert("ผิดพลาด: " + (err.message || JSON.stringify(err)));
      } finally {
          if (btn) {
              btn.disabled = false;
              btn.innerText = "Save Changes";
          }
      }
  }

  // ============ Builder Logic ============
  function placeholderAvatar(cat) {
      const label = (cat || '').split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase();
      return `<div class="w-10 h-10 bg-slate-800 rounded flex items-center justify-center text-xs font-semibold text-slate-400">${label}</div>`;

  function selectPart(category) {

      openPicker(category);

  function renderBuilderSlots() {
      const container = document.getElementById('builder-slots');
      container.innerHTML = coreCategories.map(cat => {
          const item = selectedParts[cat];
  
          // Details: CPU Cooler shows only ARGB Yes/No, others show brief specs

              if (cat === 'CPU Cooler') {
                  const s = item.specs || {};
                  const lightingVal = (s.lighting || s['spec-lighting'] || s.argb || s['has-argb'] || s['lighting'] || '').toString().toLowerCase();
                  const isARGB = /argb|rgb/.test(lightingVal) ? 'Yes' : 'No';

              } else {
                  detailsHtml = `<div class="text-[12px] text-slate-400 mt-2 truncate">${formatSpecs(item.specs)}</div>`;

          return `

                  ${item ? `<button onclick="removeItem('${cat}')" class="w-1/3 bg-transparent border border-red-500/20 text-red-400 hover:bg-red-600/10 px-3 py-2 rounded-lg text-[12px] font-semibold transition">${getText('remove')}</button>` : ''}

  function openPicker(cat) {
      const modal = document.getElementById('modal');
      const modalDiv = modal.querySelector('div');
      
      // Normalize category display
      const displayCat = getCategoryName(cat);
      const displayTitle = `${getText('selectPart')} - ${displayCat}`;
      document.getElementById('modal-title').innerText = displayTitle;
      
      // Reset modal position for mobile
      modal.style.scrollTop = 0;
      
      // Remove old search div if exists
      const oldSearch = modalDiv.querySelector('[data-search-div]');
      if (oldSearch) oldSearch.remove();
      
      // Add search and sort header (light theme)
      const searchDiv = document.createElement('div');
      searchDiv.setAttribute('data-search-div', '1');
      searchDiv.className = 'p-4 flex gap-2 border-b border-gray-700 sticky top-12 z-10 bg-slate-900';
      searchDiv.innerHTML = `
          <input type="text" id="picker-search" placeholder="${getText('search')}" class="flex-1 bg-slate-900 border border-gray-700 p-2 rounded-lg text-white text-xs outline-none focus:border-cyan-400" oninput="updatePickerList('${cat}')">
          <select id="picker-sort" onchange="updatePickerList('${cat}')" class="bg-slate-900 border border-gray-700 p-2 rounded-lg text-white text-xs outline-none focus:border-cyan-400">
              <option value="">${getText('sortBy')}</option>
              <option value="price-asc">${getText('priceLow')}</option>
              <option value="price-desc">${getText('priceHigh')}</option>
          </select>
      `;
      
      const modalList = document.getElementById('modal-list');
      modalList.parentElement.insertBefore(searchDiv, modalList);
      
      updatePickerList(cat);
      modal.classList.remove('hidden');
  }
  
  function updatePickerList(cat) {
      const list = document.getElementById('modal-list');
      const searchInput = document.getElementById('picker-search');
      const sortSelect = document.getElementById('picker-sort');
      const searchTerm = searchInput ? searchInput.value : '';
      const sortOrder = sortSelect ? sortSelect.value : '';
      
      // Normalize category comparison: case-insensitive, trim whitespace
      const normalizeCategory = (str) => (str || '').toLowerCase().trim();
      const targetCat = normalizeCategory(cat);
      
      // Handle CPU Fan / CPU Cooler mapping
      const isCoolerCategory = targetCat === 'cpu fan' || targetCat === 'cpu cooler';
      
      let filtered = allProducts.filter(p => {
          const pCat = normalizeCategory(p.category);
          if (isCoolerCategory) {
              // Accept both CPU Fan and CPU Cooler
              return pCat === 'cpu fan' || pCat === 'cpu cooler';
          }
          return pCat === targetCat;
      });
      
      // Apply compatibility filtering (use normalized comparison)
      if (targetCat === 'cpu') {
          const mobo = selectedParts['Motherboard'];
          if (mobo && mobo.specs && mobo.specs.socket) {
              filtered = filtered.filter(p => p.specs && p.specs.socket === mobo.specs.socket);
          }
      } else if (targetCat === 'motherboard') {
          const cpu = selectedParts['CPU'];
          if (cpu && cpu.specs && cpu.specs.socket) {
              filtered = filtered.filter(p => p.specs && p.specs.socket === cpu.specs.socket);
          }
      } else if (targetCat === 'ram') {
          const mobo = selectedParts['Motherboard'];
          if (mobo && mobo.specs && mobo.specs['supported-ram']) {
              filtered = filtered.filter(p => p.specs && p.specs['ram-type'] === mobo.specs['supported-ram']);
          }
      } else if (isCoolerCategory) {
          // CPU Cooler/CPU Fan compatibility check
          const cpu = selectedParts['CPU'];
          if (cpu && cpu.specs && cpu.specs.socket) {
              filtered = filtered.filter(p => p.specs && p.specs.socket === cpu.specs.socket);
          }
      }
      // Case Fan and others have no compatibility restrictions - show all
      
      filtered = filterProductsBySearch(filtered, searchTerm);
      filtered = sortProducts(filtered, sortOrder);
      
      // Display results
      if (filtered.length === 0) {
          list.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-8 text-sm">ไม่มีสินค้าในหมวดหมู่ ${getCategoryName(cat)}<br/><small class="text-[10px] text-gray-500">(No products in ${getCategoryName(cat)})</small></div>`;
      } else {
          list.innerHTML = filtered.map(p => {
              // Ensure price formatting with commas
              const displayPrice = formatPrice(p.price);
              const displayName = p.name || p.name_en || 'Unknown Product';
              const displaySpecs = formatSpecs(p.specs) || 'No specs';
              
              return `<div class="rounded-xl p-3 flex gap-3 items-center border border-gray-700 hover:border-cyan-500/50 hover:shadow-md transition bg-slate-950/80 overflow-hidden">
                  <div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-slate-800 rounded-lg overflow-hidden">
                      <img src="${p.image_url}" class="w-full h-full object-contain p-1" alt="${displayName}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23374151%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2212%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Image%3C/text%3E%3C/svg%3E'">
                  </div>
                  <div class="flex-1 overflow-hidden">
                      <div class="text-sm font-extrabold text-slate-100 line-clamp-2" title="${displayName}">${displayName}</div>
                      <div class="text-[11px] text-slate-400 truncate" title="${displaySpecs}">${displaySpecs}</div>
                      <div class="text-emerald-400 font-gaming font-bold text-base mt-1">${displayPrice} ₭</div>
                  </div>
                  <button onclick="confirmSelection('${cat}', '${p.id}')" class="flex-shrink-0 bg-transparent border border-cyan-500/50 text-cyan-400 hover:bg-cyan-600 hover:text-white px-3 py-2 rounded-lg transition text-[11px] font-semibold whitespace-nowrap">${getText('select')}</button>
              </div>`;
          }).join('');
      }
  }
  
  // Pagination renderer
  function renderPagination(totalItems) {
      const container = document.getElementById('pagination');
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
      let html = '';
      html += `<button onclick="changePage(${Math.max(1, currentPage-1)})" class="px-3 py-1 rounded bg-transparent border border-cyan-500/30 text-cyan-300 hover:bg-cyan-600 hover:text-white">Previous</button>`;
      for (let i=1;i<=totalPages;i++){
          if (i===currentPage) {
              html += `<button onclick="changePage(${i})" class="px-3 py-1 rounded bg-cyan-600 text-white">${i}</button>`;
          } else {
              html += `<button onclick="changePage(${i})" class="px-3 py-1 rounded bg-transparent border border-cyan-500/20 text-cyan-300 hover:bg-cyan-600 hover:text-white">${i}</button>`;
          }
      }
      html += `<button onclick="changePage(${Math.min(totalPages, currentPage+1)})" class="px-3 py-1 rounded bg-transparent border border-cyan-500/30 text-cyan-300 hover:bg-cyan-600 hover:text-white">Next</button>`;
      container.innerHTML = html;
  }
  
  function changePage(n){
      currentPage = n;
      filterCatalog(currentCatalog);
  }
  
  function confirmSelection(cat, id) {
      // Find the selected product
      const selectedProduct = allProducts.find(p => p.id == id);
      if (!selectedProduct) {
          alert('ไม่พบสินค้า (Product not found)');
          return;
      }
      
      // Normalize the category key for storage
      const normalizeCategory = (str) => {
          const normalized = (str || '').toLowerCase().trim();
          // Map CPU Fan to CPU Cooler for consistent storage
          if (normalized === 'cpu fan') return 'CPU Cooler';
          // Return original category from the categories array
          return categories.find(c => c.toLowerCase().trim() === normalized) || cat;
      };
      
      const storageKey = normalizeCategory(cat);
      
      // Add part to build
      addPartToBuild(storageKey, selectedProduct);
  }
  
  function addPartToBuild(category, product) {
      // Add product to selected parts
      selectedParts[category] = product;
      
      // Save to localStorage with error handling
      try {
          saveBuilder();
      } catch (e) {
          console.error('Failed to save builder:', e);
      }
      
      // Update UI immediately
      renderBuilderSlots();
      updateTotal();
      
      // Close modal with smooth transition
      closeModal();
      
      // Show brief success feedback
      showSelectionFeedback(`${product.name} ${getText('select').toLowerCase()}ได้`);
  }
  
  function showSelectionFeedback(message) {
      // Create temporary toast notification
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 right-4 bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold animate-fade-in z-50';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      // Auto-remove after 2 seconds
      setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.3s';
          setTimeout(() => toast.remove(), 300);
      }, 2000);
  }
  
  function removeItem(category) {
      if (!confirm(`ลบ ${getCategoryName(category)} ออกจากการสร้าง (Remove from build)?`)) return;
      delete selectedParts[category];
      saveBuilder();
      renderBuilderSlots();
      updateTotal();
  }
  
  function updateTotal() {
      let total = 0;
      const container = document.getElementById('summary-items');
      const summaryBox = document.getElementById('summary-box');
      
      container.innerHTML = Object.entries(selectedParts).map(([cat, p]) => {
          total += Number(p.price);
          const displayName = p.name || p.name_en || getCategoryName(cat);
          const specsStr = formatSpecs(p.specs);
          return `<div class="flex justify-between items-start gap-2 bg-white/5 p-2 rounded">
              <div class="flex-1 min-w-0">
                  <div class="font-semibold text-sm truncate" title="${displayName}">${displayName}</div>
                  ${specsStr ? `<div class="text-[10px] text-gray-500 truncate mt-0.5" title="${specsStr}">${specsStr}</div>` : ''}
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                  <span class="text-cyan-400 font-gaming text-sm">${formatPrice(p.price)} ₭</span>
                  <button onclick="removeItem('${cat}')" class="text-red-400 hover:text-red-300 font-bold text-lg leading-none">×</button>
              </div>
          </div>`;
      }).join('');
      document.getElementById('total-price-display').innerText = formatPrice(total);
      
      // Calculate power estimate and compatibility
      const powerEstimate = calculatePowerEstimate();
      const compatibility = getCompatibilityStatus();
      
      // Remove old badges and power div
      summaryBox.querySelectorAll('[data-compat-badge], [data-power-div]').forEach(el => el.remove());
      
      // Add compatibility badge
      const badge = document.createElement('div');
      badge.setAttribute('data-compat-badge', '1');
      badge.className = compatibility.isCompatible ? 'text-[10px] text-green-400 mb-3' : 'text-[10px] text-orange-400 mb-3';
      badge.innerHTML = compatibility.isCompatible ? `✅ ${getText('compatible')}` : `⚠️ ${getText('checkCompat')}`;
      container.parentElement.insertBefore(badge, container);
      
      // Add power estimate
      const powerDiv = document.createElement('div');
      powerDiv.setAttribute('data-power-div', '1');
      powerDiv.className = 'text-[10px] text-gray-600 mt-2 p-2 bg-gray-50 rounded';
      powerDiv.innerHTML = `⚡ ${getText('estPower')}: ${powerEstimate}W`;
      container.parentElement.appendChild(powerDiv);
      
      // Add PSU warning if needed
      if (!compatibility.isCompatible && compatibility.warnings.some(w => w.includes('PSU'))) {
          const warning = document.createElement('div');
          warning.className = 'text-[9px] text-red-400 mt-2 p-2 bg-red-900/20 rounded';
          warning.innerHTML = compatibility.warnings.filter(w => w.includes('PSU')).join('<br>');
          container.parentElement.appendChild(warning);
      }
  }
  
  // ============ Tab Switching ============
  function switchTab(tab) {
      document.getElementById('section-catalog').classList.toggle('hidden', tab !== 'catalog');
      document.getElementById('section-builder').classList.toggle('hidden', tab !== 'builder');
      document.getElementById('tab-catalog').className = tab === 'catalog' ? 'tab-active py-1 text-[10px] md:text-sm font-gaming uppercase transition' : 'py-1 text-[10px] md:text-sm font-gaming uppercase text-gray-400 transition';

  // ============ Admin Login (main page only) ============

      const searchInput = document.getElementById('picker-search');

  // Initialize on load
  init();

  <script>
  // Save only the summary box as PNG using html2canvas
  async function saveImage() {
      const el = document.getElementById('summary-box');
      if (!el) {
          alert('Summary box not found');
          return;
      }
      try {
          // ensure white background for export
          const origBg = el.style.backgroundColor;
          el.style.backgroundColor = '#ffffff';
          const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff' });
          el.style.backgroundColor = origBg;
          const dataUrl = canvas.toDataURL('image/png');
          const link = document.createElement('a');
          link.href = dataUrl;
          link.download = 'TIANTIAN-BUILD.png';
          document.body.appendChild(link);
          link.click();
          link.remove();
      } catch (err) {
          alert('Error saving image: ' + (err.message || err));
      }
  }
  
  function resetBuild() {
      if (!confirm('Reset build and clear selections?')) return;
      selectedParts = {};
      try { localStorage.removeItem(BUILDER_KEY); } catch (e) {}
      renderBuilderSlots();
      updateTotal();
  }
  </script>
